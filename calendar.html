    <style>
        :root {
            --primary-color: #0f2038;       /* Deeper, more premium navy */
            --secondary-color: #1d4ed8;     /* Vibrant royal blue for highlights */
            --text-color: #1e293b;          /* Clean slate text */
            --light-bg: #ffffff;            /* Pure white background for content blocks */
            --accent-gold: #b89222;         /* Sophisticated gold accent */
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-color);
            background-color: #f1f5f9;      /* Light slate body background to make cards pop */
            line-height: 1.6;
        }
        header {
            background: linear-gradient(135deg, var(--primary-color) 0%, #1e3a8a 100%);
            color: white;
            padding: 3.5rem 2rem;
            text-align: center;
            border-bottom: 4px solid var(--accent-gold);
        }
        header h1 { 
            margin: 0; 
            font-size: 3rem; 
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        header p {
            margin-top: 0.5rem;
            opacity: 0.9;
            font-size: 1.2rem;
            font-family: 'Playfair Display', Georgia, serif;
            font-style: italic;
        }
        nav {
            background-color: rgba(15, 32, 56, 0.95);
            backdrop-filter: blur(8px);
            text-align: center;
            padding: 0.75rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        nav a {
            color: #e2e8f0;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s ease, border-bottom 0.2s ease;
            padding-bottom: 4px;
            border-bottom: 2px solid transparent;
        }
        nav a:hover {
            color: white;
            border-bottom: 2px solid var(--accent-gold);
        }
        .container {
            max-width: 900px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }
        .main-card {
            background: var(--light-bg);
            padding: 2.5rem 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
            text-align: center;
        }
        h2 {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 700;
            color: var(--primary-color);
            margin-top: 0;
            font-size: 2rem;
            margin-bottom: 1.5rem;
        }
        .calendar-container {
            background-color: #ffffff;
            border-radius: 8px;
            max-width: 100%;
            overflow-x: auto;
            margin-top: 1.5rem;
            border: 1px solid #e2e8f0;
        }
        .calendar-container iframe {
            max-width: 100%;
            display: block;
        }
        @media (max-width: 850px) {
            .calendar-container iframe {
                width: 100% !important;
                height: 450px !important;
            }
        }
        footer {
            text-align: center;
            padding: 2.5rem;
            background: var(--primary-color);
            color: #94a3b8;
            margin-top: 6rem;
            border-top: 4px solid var(--accent-gold);
            font-size: 0.9rem;
        }
        footer p { margin: 0; }
    </style>
</head>
